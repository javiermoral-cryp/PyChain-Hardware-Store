<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fbeaea;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: white;
            border: 1px solid #ff4d4d;
            border-radius: 10px;
            padding: 20px;
            display: inline-block;
        }
        h1 {
            color: #cc0000;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 16px;
            background-color: #cc0000;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a:hover {
            background-color: #a60000;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Error!</h1>
        <p>{{ mensaje }}</p>
        <a href="{% url 'inicio' %}">Volver al inicio</a>
    </div>

</body>
</html>
