<h2 style="text-align:center; margin-bottom: 15px;">Login Administrador</h2>

{% if error %}
  <div style="background:#ffdddd; padding:10px; border-left:4px solid red; margin-bottom:15px;">
      <p style="margin:0; color:#b30000;">{{ error }}</p>
  </div>
{% endif %}

<form method="post" style="
    max-width: 350px;
    margin: auto;
    background: #f7f7f7;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
">
    {% csrf_token %}

    <label for="username" style="font-weight: bold;">Usuario:</label>
    <input type="text" name="username" required style="
        width: 100%; padding: 10px; margin-top: 5px;
        margin-bottom: 15px; border-radius: 5px;
        border: 1px solid #ccc;
    ">

    <label for="password" style="font-weight: bold;">Contraseña:</label>
    <input type="password" name="password" required style="
        width: 100%; padding: 10px; margin-top: 5px;
        margin-bottom: 20px; border-radius: 5px;
        border: 1px solid #ccc;
    ">

    <button type="submit" style="
        width: 100%; padding: 10px;
        background: #2c3e50; color: white;
        border: none; border-radius: 5px;
        font-size: 16px; cursor: pointer;
    ">Entrar</button>
</form>

<p style="text-align:center; margin-top:15px;">
    ¿No tienes cuenta?
    <a href="{% url 'registro_admin' %}" style="color:#2c3e50; font-weight:bold;">
        Crear cuenta de administrador
    </a>
</p>
